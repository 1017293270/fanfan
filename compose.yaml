services:
  api:
    build:
      context: .
      target: server
    environment:
      NODE_ENV: production
      API_PORT: 8787
      DATA_FILE_PATH: /data/kaifanli.json
      AMAP_API_KEY: ${AMAP_API_KEY:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-https://api.openai.com/v1}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-gpt-4.1-mini}
      SESSION_SECRET: ${SESSION_SECRET:-kaifanli-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-admin-password}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-饭饭狸管理员}
      INITIAL_INVITE_CODE: ${INITIAL_INVITE_CODE:-FANFAN-START}
    volumes:
      - kaifanli_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      target: web
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  kaifanli_data:
  caddy_data:
  caddy_config:
